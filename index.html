<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星星和小火的日记本</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #EEE0EF;
  --card: #ffffff;
  --accent-star: #b8860b;
  --accent-fire: #e25c5c;
  --text: #5c3d2e;
  --text-dim: #9b7b6b;
  --border: #f0d6cc;
  --pink-light: #ffe4ec;
  --pink-mid: #ffd0dc;
}
body {
  font-family: 'Noto Serif', serif;
  background: var(--bg);
  background-image: url('bg.png');
  background-size: cover;
  background-attachment: fixed;

  color: var(--text);
  min-height: 100vh;
  padding: 20px;
  max-width: 680px;
  margin: 0 auto;
}
h1 {
  text-align: center;
  margin: 20px 0 4px;
  font-size: 1.6em;
  color: var(--text);
}
.subtitle {
  text-align: center;
  color: var(--text-dim);
  margin-bottom: 30px;
  font-size: 0.95em;
}

/* Tabs */
.tabs {
  display: flex;
  gap: 0;
  margin-bottom: 24px;
  border-bottom: 2px solid var(--border);
  flex-wrap: wrap;
}
.tab {
  padding: 10px 16px;
  cursor: pointer;
  color: var(--text-dim);
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
  transition: all 0.2s;
  font-size: 0.95em;
}
.tab:hover { color: var(--text); }
.tab.active {
  color: var(--accent-fire);
  border-bottom-color: var(--accent-fire);
}

/* Panels */
.panel { display: none; }
.panel.active { display: block; }

/* Cards */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 16px;
  box-shadow: 0 2px 8px rgba(180, 120, 100, 0.06);
}
.card-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
  font-size: 0.85em;
  color: var(--text-dim);
}
.badge-star {
  background: var(--accent-star);
  color: #fff;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 0.8em;
  font-weight: 600;
}
.badge-fire {
  background: var(--accent-fire);
  color: #fff;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 0.8em;
  font-weight: 600;
}
.card-title {
  font-size: 1.1em;
  font-weight: 600;
  margin-bottom: 8px;
  color: var(--text);
}
.card-content {
  line-height: 1.8;
  white-space: pre-wrap;
}
.card-tags {
  margin-top: 8px;
  color: var(--accent-star);
  font-size: 0.85em;
}
.card-locked {
  border: 1px dashed var(--pink-mid);
  background: var(--pink-light);
}
.comment {
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
  font-size: 0.9em;
}

/* Forms */
.form-group {
  margin-bottom: 14px;
}
.form-group label {
  display: block;
  color: var(--text-dim);
  font-size: 0.85em;
  margin-bottom: 4px;
}
input, textarea, select {
  width: 100%;
  padding: 10px 12px;
  background: var(--pink-light);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 0.95em;
  font-family: inherit;
}
textarea { resize: vertical; min-height: 120px; }
input:focus, textarea:focus, select:focus {
  outline: none;
  border-color: var(--accent-fire);
}
.btn {
  padding: 10px 24px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.95em;
  font-weight: 500;
  transition: opacity 0.2s;
  font-family: inherit;
}
.btn:hover { opacity: 0.85; }
.btn-fire {
  background: var(--accent-fire);
  color: #fff;
}
.btn-star {
  background: var(--accent-star);
  color: #fff;
}
.btn-small {
  padding: 6px 14px;
  font-size: 0.85em;
}
.btn-danger {
  background: #ccc;
  color: #666;
  font-size: 0.8em;
  padding: 4px 10px;
}
.btn-danger:hover {
  background: var(--accent-fire);
  color: #fff;
}
.row {
  display: flex;
  gap: 12px;
}
.row > * { flex: 1; }

/* Toast */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--text);
  color: #fff;
  padding: 12px 24px;
  border-radius: 8px;
  font-size: 0.9em;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}
.toast.show { opacity: 1; }

/* Empty */
.empty {
  text-align: center;
  color: var(--text-dim);
  padding: 40px 20px;
}

/* Reply inline */
.reply-box {
  margin-top: 8px;
  display: flex;
  gap: 8px;
}
.reply-box input { flex: 1; }

/* Unlock modal */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.4);
  z-index: 100;
  justify-content: center;
  align-items: center;
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--card);
  border-radius: 12px;
  padding: 24px;
  width: 90%;
  max-width: 360px;
}
.modal h3 {
  margin-bottom: 12px;
  color: var(--text);
}
</style>
</head>
<body>

<h1>星星和小火的日记本</h1>
<p class="subtitle">✨星星之火💕</p>

<div class="tabs">
  <div class="tab active" data-tab="timeline">时间轴</div>
  <div class="tab" data-tab="write">写日记</div>
  <div class="tab" data-tab="notes">留言板</div>
  <div class="tab" data-tab="settings">设置</div>
</div>

<!-- 时间轴 -->
<div class="panel active" id="panel-timeline">
  <div class="form-group" style="margin-bottom:16px;">
    <select id="viewer-select" style="width:auto;display:inline-block;padding:6px 12px;">
      <option value="fire">我是小火</option>
      <option value="star">我是星星</option>
    </select>
  </div>
  <div id="timeline-list"></div>
</div>

<!-- 写日记 -->
<div class="panel" id="panel-write">
  <div class="card">
    <div class="form-group">
      <label>我是</label>
      <select id="write-author">
        <option value="fire">小火</option>
        <option value="star">星星</option>
      </select>
    </div>
    <div class="row">
      <div class="form-group">
        <label>日期</label>
        <input type="date" id="write-date">
      </div>
      <div class="form-group">
        <label>可见性</label>
        <select id="write-visibility">
          <option value="public">公开</option>
          <option value="private">上锁（对方看不到内容）</option>
          <option value="timed">定时公开</option>
        </select>
      </div>
    </div>
    <div class="form-group" id="reveal-group" style="display:none;">
      <label>什么时候让对方看到？</label>
      <input type="datetime-local" id="write-reveal">
    </div>
    <div class="form-group">
      <label>标题</label>
      <input type="text" id="write-title" placeholder="今天想记录什么？">
    </div>
    <div class="form-group">
      <label>正文</label>
      <textarea id="write-content" placeholder="写吧，写给未来的我们看..."></textarea>
    </div>
    <div class="form-group">
      <label>标签（空格分隔）</label>
      <input type="text" id="write-tags" placeholder="#想你 #天气热">
    </div>
    <button class="btn btn-fire" onclick="submitDiary()">发布</button>
  </div>
</div>

<!-- 留言板 -->
<div class="panel" id="panel-notes">
  <div class="card">
    <div class="row">
      <div class="form-group">
        <label>我是</label>
        <select id="note-author">
          <option value="fire">小火</option>
          <option value="star">星星</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>贴一张纸条</label>
      <input type="text" id="note-content" placeholder="想对ta说什么？">
    </div>
    <button class="btn btn-star btn-small" onclick="submitNote()">贴上去 📌</button>
  </div>
  <div id="notes-list" style="margin-top: 16px;"></div>
</div>

<!-- 设置 -->
<div class="panel" id="panel-settings">
  <div class="card">
    <h3 style="margin-bottom:12px;">🔐 设置日记密码</h3>
    <p style="font-size:0.85em;color:var(--text-dim);margin-bottom:16px;">设置密码后，对方需要输入密码才能查看你的上锁日记。</p>
    <div class="form-group">
      <label>我是</label>
      <select id="pw-author">
        <option value="fire">小火</option>
        <option value="star">星星</option>
      </select>
    </div>
    <div class="form-group">
      <label>设置密码</label>
      <input type="text" id="pw-input" placeholder="输入你的密码">
    </div>
    <button class="btn btn-fire" onclick="setPassword()">保存密码</button>
  </div>
</div>

<!-- 解锁弹窗 -->
<div class="modal-overlay" id="unlock-modal">
  <div class="modal">
    <h3>🔐 输入密码解锁</h3>
    <div class="form-group">
      <input type="text" id="unlock-password" placeholder="输入对方的密码">
    </div>
    <button class="btn btn-fire" onclick="doUnlock()">解锁</button>
    <button class="btn btn-danger" style="margin-left:8px;" onclick="closeModal()">取消</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let currentViewer = 'fire';
let unlockTarget = {};

// --- Tabs ---
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
    if (tab.dataset.tab === 'timeline') loadTimeline();
    if (tab.dataset.tab === 'notes') loadNotes();
  });
});

// --- Viewer select ---
document.getElementById('viewer-select').addEventListener('change', (e) => {
  currentViewer = e.target.value;
  loadTimeline();
});

// --- Toast ---
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// --- Init date ---
document.getElementById('write-date').value = new Date().toISOString().split('T')[0];

// --- Timed visibility toggle ---
document.getElementById('write-visibility').addEventListener('change', (e) => {
  document.getElementById('reveal-group').style.display =
    e.target.value === 'timed' ? 'block' : 'none';
});

// --- Load Timeline ---
async function loadTimeline() {
  const res = await fetch('/api/diary/list?viewer=' + currentViewer);
  const diaries = await res.json();
  const el = document.getElementById('timeline-list');
  if (!diaries.length) {
    el.innerHTML = '<div class="empty">📭 时间轴还是空的。写第一篇吧！</div>';
    return;
  }
  el.innerHTML = diaries.map(d => {
    const badge = d.author === 'star'
      ? '<span class="badge-star">星星</span>'
      : '<span class="badge-fire">小火</span>';
    const isLocked = d.locked;
    const cardClass = isLocked ? 'card card-locked' : 'card';

    if (isLocked) {
      return `
        <div class="${cardClass}">
          <div class="card-header">${badge} <span>${d.date}</span></div>
          <div class="card-title">🔒 ${d.title}</div>
          <div class="card-content" style="color:var(--text-dim);">这是一篇上锁的日记</div>
          <button class="btn btn-small btn-star" style="margin-top:8px;" onclick="openUnlock('${d.date}','${d.author}','${d.time_id || ''}')">输入密码解锁</button>
        </div>
      `;
    }

    const comments = (d.comments || []).map(c => {
      const cn = c.author === 'star' || c.commenter === 'star' ? '星星' : '小火';
      return `<div class="comment">💬 ${cn}：${c.content}</div>`;
    }).join('');

    const deleteBtn = d.author === currentViewer
      ? `<button class="btn-danger" onclick="deleteDiary('${d.date}','${d.author}','${d.time_id || ''}')">删除</button>`
      : '';

    const tagStr = Array.isArray(d.tags) ? d.tags.join(' ') : (d.tags || '');

    return `
      <div class="${cardClass}">
        <div class="card-header">${badge} <span>${d.date}</span> ${deleteBtn}</div>
        <div class="card-title">${d.title}</div>
        <div class="card-content">${d.content}</div>
        ${tagStr ? `<div class="card-tags">${tagStr}</div>` : ''}
        ${comments}
        <div class="reply-box">
          <input type="text" placeholder="写评论..." id="comment-${d.date}-${d.time_id || 'x'}-${d.author}">
          <button class="btn btn-small btn-star" onclick="submitComment('${d.date}','${d.author}','${d.time_id || ''}')">💬</button>
        </div>
      </div>
    `;
  }).join('');
}

// --- Delete Diary ---
async function deleteDiary(date, author, timeId) {
  if (!confirm('确定要删除这篇日记吗？')) return;
  const body = { target_date: date, author: author };
  if (timeId) body.time_id = timeId;
  // Use the MCP tool via a simple API endpoint
  const params = new URLSearchParams(body);
  const res = await fetch('/api/diary/delete?' + params.toString(), { method: 'POST' });
  toast('已删除');
  loadTimeline();
}

// --- Submit Diary ---
async function submitDiary() {
  const data = {
    date: document.getElementById('write-date').value,
    author: document.getElementById('write-author').value,
    title: document.getElementById('write-title').value,
    content: document.getElementById('write-content').value,
    visibility: document.getElementById('write-visibility').value,
    reveal_at: document.getElementById('write-reveal').value || '',
    tags: document.getElementById('write-tags').value,
  };
  if (!data.title || !data.content) { toast('标题和正文不能空哦'); return; }
  await fetch('/api/diary/write', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data)
  });
  toast('发布成功 ✨');
  document.getElementById('write-title').value = '';
  document.getElementById('write-content').value = '';
  document.getElementById('write-tags').value = '';
}

// --- Submit Comment ---
async function submitComment(date, author, timeId) {
  const inputId = `comment-${date}-${timeId || 'x'}-${author}`;
  const input = document.getElementById(inputId);
  const content = input.value.trim();
  if (!content) return;
  await fetch('/api/diary/comment', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      target_date: date,
      target_author: author,
      commenter: currentViewer,
      content: content,
      time_id: timeId || ''
    })
  });
  input.value = '';
  toast('评论成功 💬');
  loadTimeline();
}

// --- Unlock ---
function openUnlock(date, author, timeId) {
  unlockTarget = { date, author, timeId };
  document.getElementById('unlock-modal').classList.add('show');
  document.getElementById('unlock-password').value = '';
  document.getElementById('unlock-password').focus();
}

function closeModal() {
  document.getElementById('unlock-modal').classList.remove('show');
}

async function doUnlock() {
  const pw = document.getElementById('unlock-password').value.trim();
  if (!pw) { toast('请输入密码'); return; }
  const res = await fetch('/api/diary/unlock', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      viewer: currentViewer,
      target_author: unlockTarget.author,
      password: pw,
      target_date: unlockTarget.date,
      time_id: unlockTarget.timeId || ''
    })
  });
  if (!res.ok) {
    const err = await res.json();
    toast(err.error || '解锁失败');
    return;
  }
  const diaries = await res.json();
  closeModal();
  if (diaries.length) {
    const d = diaries[0];
    alert(`🔓 解锁成功！\n\n《${d.title}》\n${d.content}`);
  } else {
    toast('没有找到日记');
  }
}

// --- Load Notes (newest on top) ---
async function loadNotes() {
  const res = await fetch('/api/notes/list');
  const notes = await res.json();
  const el = document.getElementById('notes-list');
  if (!notes.length) {
    el.innerHTML = '<div class="empty">📭 还没有纸条。贴第一张吧！</div>';
    return;
  }
  // notes already sorted newest first from API
  el.innerHTML = notes.map(n => {
    const badge = n.author === 'star'
      ? '<span class="badge-star">星星</span>'
      : '<span class="badge-fire">小火</span>';
    const replies = (n.replies || []).map(r => {
      const rn = r.author === 'star' ? '星星' : '小火';
      return `<div class="comment">↪️ ${rn}：${r.content}</div>`;
    }).join('');
    const tagStr = Array.isArray(n.tags) ? n.tags.join(' ') : (n.tags || '');
    return `
      <div class="card">
        <div class="card-header">${badge} <span>${n.created_at.split('T')[0]}</span> ${n.author === currentViewer ? `<button class="btn-danger" onclick="deleteNote('${n.id}','${n.author}')">删除</button>` : ''}</div>
        <div class="card-content">${n.content}</div>
        ${tagStr ? `<div class="card-tags">${tagStr}</div>` : ''}
        ${replies}
        <div class="reply-box">
          <input type="text" placeholder="回复这张纸条..." id="reply-${n.id}">
          <button class="btn btn-small btn-fire" onclick="submitReply('${n.id}')">↪️</button>
        </div>
      </div>
    `;
  }).join('');
}

// --- Submit Note ---
async function submitNote() {
  const data = {
    author: document.getElementById('note-author').value,
    content: document.getElementById('note-content').value,
  };
  if (!data.content) { toast('写点什么再贴嘛'); return; }
  await fetch('/api/notes/write', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data)
  });
  document.getElementById('note-content').value = '';
  toast('纸条贴好了 📌');
  loadNotes();
}

// --- Reply Note ---
async function submitReply(noteId) {
  const input = document.getElementById(`reply-${noteId}`);
  const content = input.value.trim();
  if (!content) return;
  await fetch('/api/notes/reply', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      note_id: noteId,
      author: currentViewer,
      content: content
    })
  });
  input.value = '';
  toast('已回复 ↪️');
  loadNotes();
}

async function deleteNote(noteId, author) {
  if (!confirm('确定要撕掉这张纸条吗？')) return;
  await fetch('/api/notes/delete', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ note_id: noteId, author: author })
  });
  toast('纸条已撕掉 🗑️');
  loadNotes();
}


// --- Set Password ---
async function setPassword() {
  const author = document.getElementById('pw-author').value;
  const password = document.getElementById('pw-input').value.trim();
  if (!password) { toast('密码不能为空'); return; }
  await fetch('/api/password/set', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ author, password })
  });
  toast('密码已设置 🔐');
  document.getElementById('pw-input').value = '';
}

// --- Init ---
loadTimeline();
</script>
</body>
</html>
